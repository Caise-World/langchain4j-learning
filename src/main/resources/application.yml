spring:
  application:
    name: enterprise-ai-service
  datasource:
    url: jdbc:mysql://localhost:3306/ai_service?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  profiles:
    active: local

server:
  port: 8081

logging:
  level:
    com.example.ai: DEBUG

# AI Models Configuration (共享配置，所有 profile 都用这个)
ai-models:
  minimax:
    api-key: ${MINIMAX_API_KEY:your-api-key-here}
    model-name: minimax-m2.7
    base-url: https://api.minimax.chat/v1
    temperature: 0.7
    max-tokens: 1024
  glm4:
    api-key: ${GLM4_API_KEY:your-api-key-here}
    model-name: glm-4
    base-url: https://open.bigmodel.cn/api/paas/v4
    temperature: 0.7
    max-tokens: 1024
  openai:
    api-key: ${OPENAI_API_KEY:your-api-key-here}
    model-name: gpt-4o
    base-url: https://api.openai.com/v1
    temperature: 0.7
    max-tokens: 1024

---
# PgVector profile for production
spring:
  config:
    activate:
      on-profile: pgvector
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_service
    username: postgres
    password: ${PG_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect